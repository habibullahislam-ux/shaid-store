<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>এডমিন প্যানেল — সাঈদের দোকান</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep: #1F4A3A; --green-mid: #2E6350; --turmeric: #E1A335; --brick: #B0432E;
    --paper: #F6F1E4; --paper-2: #EFE7D3; --ink: #262220; --ink-soft: #6b6258; --line: #DBD0B4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Hind Siliguri', sans-serif; background:var(--paper); color:var(--ink);}
  .display{font-family:'Baloo Da 2', sans-serif;}

  /* ---- Login screen ---- */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{background:#fff; border-radius:18px; padding:32px 26px; width:100%; max-width:360px; box-shadow:0 10px 30px rgba(38,34,32,0.1); border:1px solid var(--line);}
  .login-title{font-size:22px; font-weight:700; color:var(--green-deep); margin-bottom:4px;}
  .login-sub{font-size:13px; color:var(--ink-soft); margin-bottom:22px;}
  .login-card input{width:100%; padding:12px 14px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; font-family:inherit; margin-bottom:12px;}
  .login-btn{width:100%; padding:13px; border:none; border-radius:10px; background:var(--green-deep); color:var(--paper); font-weight:700; font-size:14.5px; font-family:inherit; cursor:pointer;}
  .login-error{color:var(--brick); font-size:12.5px; margin-top:8px; display:none;}

  /* ---- App shell ---- */
  #app{display:none;}
  .topbar{background:var(--green-deep); color:var(--paper); padding:16px 20px; display:flex; justify-content:space-between; align-items:center;}
  .topbar-title{font-size:18px; font-weight:700;}
  .logout-btn{background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:var(--paper); padding:7px 14px; border-radius:8px; font-size:12.5px; cursor:pointer; font-family:inherit;}

  .tabs{display:flex; gap:6px; padding:14px 20px 0; background:var(--paper); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--line);}
  .tab{padding:10px 16px; font-size:14px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:3px solid transparent;}
  .tab.active{color:var(--green-deep); border-color:var(--turmeric);}

  .panel{display:none; padding:18px 20px 60px; max-width:1100px; margin:0 auto;}
  .panel.active{display:block;}

  .toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center;}
  .toolbar input, .toolbar select{padding:10px 12px; border-radius:10px; border:1.5px solid var(--line); font-size:13.5px; font-family:inherit; background:#fff;}
  .btn{padding:10px 16px; border-radius:10px; border:none; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit;}
  .btn-primary{background:var(--green-deep); color:var(--paper);}
  .btn-secondary{background:var(--turmeric); color:#3a2a06;}
  .btn-danger{background:var(--brick); color:#fff;}
  .btn-sm{padding:6px 10px; font-size:12px; border-radius:8px;}

  .stats-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px;}
  .stat-card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px;}
  .stat-num{font-size:22px; font-weight:800; color:var(--green-deep);}
  .stat-label{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  table{width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; font-size:13.5px;}
  thead{background:var(--paper-2);}
  th{text-align:left; padding:10px 12px; font-size:12px; color:var(--ink-soft); font-weight:700;}
  td{padding:8px 12px; border-top:1px solid var(--line); vertical-align:middle;}
  tr.low-stock td{background:#FBEEEA;}
  .table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px;}
  .edit-input{width:70px; padding:6px 8px; border-radius:6px; border:1px solid var(--line); font-family:inherit; font-size:13px;}
  .badge{padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700; display:inline-block;}
  .badge-active{background:#E4F0EA; color:var(--green-deep);}
  .badge-inactive{background:#EEE; color:#888;}

  .status-badge{padding:4px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
  .status-Pending{background:#FEF3D6; color:#8a6300;}
  .status-Confirmed{background:#DCEEFA; color:#1a5f8a;}
  .status-Delivered{background:#E4F0EA; color:var(--green-deep);}
  .status-Cancelled{background:#FBEEEA; color:var(--brick);}

  .order-card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px;}
  .order-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
  .order-id{font-weight:700; font-size:14px;}
  .order-meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .order-items{font-size:13px; margin:8px 0; padding:8px 0; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line);}
  .order-items div{padding:3px 0;}
  .order-foot{display:flex; justify-content:space-between; align-items:center; margin-top:8px; flex-wrap:wrap; gap:8px;}
  .order-total{font-weight:700; color:var(--green-deep);}
  .order-actions{display:flex; gap:6px; flex-wrap:wrap;}
  .pay-info{font-size:12px; background:var(--paper-2); padding:6px 10px; border-radius:8px; margin-top:6px;}

  .modal-overlay{position:fixed; inset:0; background:rgba(38,34,32,0.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff; border-radius:16px; padding:22px; width:100%; max-width:400px; max-height:85vh; overflow-y:auto;}
  .modal-title{font-size:17px; font-weight:700; margin-bottom:14px;}
  .modal input, .modal select{width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid var(--line); font-size:13.5px; font-family:inherit; margin-bottom:10px;}
  .field-label{font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:4px; display:block;}
  .modal-actions{display:flex; gap:8px; margin-top:8px;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green-deep); color:var(--paper); padding:12px 20px; border-radius:10px; font-size:13.5px; z-index:200; display:none; box-shadow:0 6px 20px rgba(0,0,0,0.2);}
  .empty-note{text-align:center; padding:30px; color:var(--ink-soft); font-size:13.5px;}
</style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginScreen">
    <div class="login-card">
      <div class="login-title display">এডমিন লগইন</div>
      <div class="login-sub">সাঈদের দোকান ব্যবস্থাপনা প্যানেল</div>
      <input type="email" id="loginEmail" placeholder="ইমেইল">
      <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
      <button class="login-btn" id="loginBtn">লগইন করুন</button>
      <div class="login-error" id="loginError">ইমেইল বা পাসওয়ার্ড ভুল হয়েছে</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="topbar">
      <div class="topbar-title display">🏪 সাঈদের দোকান — এডমিন</div>
      <button class="logout-btn" id="logoutBtn">লগআউট</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="dashboard">ড্যাশবোর্ড</div>
      <div class="tab" data-tab="products">পণ্য</div>
      <div class="tab" data-tab="orders">অর্ডার</div>
    </div>

    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-num" id="statPending">-</div><div class="stat-label">পেন্ডিং অর্ডার</div></div>
        <div class="stat-card"><div class="stat-num" id="statToday">-</div><div class="stat-label">আজকের অর্ডার</div></div>
        <div class="stat-card"><div class="stat-num" id="statProducts">-</div><div class="stat-label">মোট পণ্য</div></div>
        <div class="stat-card"><div class="stat-num" id="statLowStock">-</div><div class="stat-label">কম স্টক পণ্য</div></div>
      </div>
      <div class="empty-note">অর্ডার ও পণ্য ট্যাব থেকে বিস্তারিত পরিচালনা করুন</div>
    </div>

    <!-- PRODUCTS -->
    <div class="panel" id="panel-products">
      <div class="toolbar">
        <input type="text" id="prodSearch" placeholder="🔍 পণ্য খুঁজুন...">
        <select id="prodCatFilter"><option value="সব">সব ক্যাটাগরি</option></select>
        <button class="btn btn-primary" id="addProductBtn">+ নতুন পণ্য</button>
        <button class="btn btn-secondary" id="importSeedBtn">সিড ডেটা ইম্পোর্ট (৫০০ পণ্য)</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>পণ্য</th><th>ক্যাটাগরি</th><th>ব্র্যান্ড</th><th>ইউনিট</th><th>দাম (৳)</th><th>স্টক</th><th>স্ট্যাটাস</th><th></th>
          </tr></thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ORDERS -->
    <div class="panel" id="panel-orders">
      <div class="toolbar">
        <select id="orderStatusFilter">
          <option value="সব">সব অর্ডার</option>
          <option value="Pending">Pending</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div id="ordersList"></div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-title" id="productModalTitle">নতুন পণ্য যোগ করুন</div>
      <input type="hidden" id="editProductId">
      <label class="field-label">পণ্যের নাম</label>
      <input type="text" id="fProductName" placeholder="যেমন: মিনিকেট চাল">
      <label class="field-label">ক্যাটাগরি</label>
      <input type="text" id="fCategory" placeholder="যেমন: চাল">
      <label class="field-label">ব্র্যান্ড</label>
      <input type="text" id="fBrand" placeholder="যেমন: PRAN">
      <label class="field-label">ইউনিট</label>
      <input type="text" id="fUnit" placeholder="যেমন: ১ কেজি">
      <label class="field-label">দাম (৳)</label>
      <input type="number" id="fPrice" placeholder="0">
      <label class="field-label">স্টক পরিমাণ</label>
      <input type="number" id="fStock" placeholder="0">
      <label class="field-label">আইকন (ইমোজি)</label>
      <input type="text" id="fEmoji" placeholder="🛒">
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveProductBtn" style="flex:1">সেভ করুন</button>
        <button class="btn" id="cancelProductBtn" style="flex:1; background:var(--paper-2)">বাতিল</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let products = [];
let orders = [];

// ---------- AUTH ----------
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProducts();
    loadOrders();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

document.getElementById('loginBtn').addEventListener('click', ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  auth.signInWithEmailAndPassword(email, pass)
    .catch(()=>{ document.getElementById('loginError').style.display = 'block'; });
});
document.getElementById('logoutBtn').addEventListener('click', ()=> auth.signOut());

// ---------- TABS ----------
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(()=> t.style.display = 'none', 2500);
}

// ---------- PRODUCTS ----------
function loadProducts(){
  db.collection('products').orderBy('category').onSnapshot(snapshot=>{
    products = snapshot.docs.map(doc=>({ id: doc.id, ...doc.data() }));
    populateCategoryFilter();
    renderProductTable();
    renderStats();
  });
}

function populateCategoryFilter(){
  const sel = document.getElementById('prodCatFilter');
  const current = sel.value;
  const cats = [...new Set(products.map(p=>p.category))];
  sel.innerHTML = `<option value="সব">সব ক্যাটাগরি</option>` + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  sel.value = current || "সব";
}

function renderProductTable(){
  const term = document.getElementById('prodSearch').value.trim().toLowerCase();
  const cat = document.getElementById('prodCatFilter').value;
  const tbody = document.getElementById('productTableBody');
  const list = products.filter(p=>{
    const catMatch = cat === "সব" || p.category === cat;
    const searchMatch = !term || p.productName.toLowerCase().includes(term) || (p.brand||'').toLowerCase().includes(term);
    return catMatch && searchMatch;
  });
  if(list.length === 0){
    tbody.innerHTML = `<tr><td colspan="8" class="empty-note">কোনো পণ্য পাওয়া যায়নি। "সিড ডেটা ইম্পোর্ট" চাপুন অথবা নতুন পণ্য যোগ করুন।</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(p=>`
    <tr class="${p.stock<=5 ? 'low-stock':''}" data-id="${p.id}">
      <td>${p.emoji||'🛒'} ${p.productName}</td>
      <td>${p.category}</td>
      <td>${p.brand||'-'}</td>
      <td>${p.unit||'-'}</td>
      <td><input class="edit-input price-input" type="number" value="${p.price}" data-id="${p.id}"></td>
      <td><input class="edit-input stock-input" type="number" value="${p.stock}" data-id="${p.id}"></td>
      <td><span class="badge ${p.status==='active'?'badge-active':'badge-inactive'}" data-id="${p.id}" style="cursor:pointer">${p.status==='active'?'সক্রিয়':'নিষ্ক্রিয়'}</span></td>
      <td><button class="btn btn-danger btn-sm" data-id="${p.id}" data-action="delete">মুছুন</button></td>
    </tr>
  `).join('');
}

document.getElementById('prodSearch').addEventListener('input', renderProductTable);
document.getElementById('prodCatFilter').addEventListener('change', renderProductTable);

document.getElementById('productTableBody').addEventListener('change', (e)=>{
  const id = e.target.dataset.id;
  if(!id) return;
  if(e.target.classList.contains('price-input')){
    db.collection('products').doc(id).update({ price: Number(e.target.value) || 0 })
      .then(()=> showToast('দাম আপডেট হয়েছে'));
  }
  if(e.target.classList.contains('stock-input')){
    db.collection('products').doc(id).update({ stock: Number(e.target.value) || 0 })
      .then(()=> showToast('স্টক আপডেট হয়েছে'));
  }
});

document.getElementById('productTableBody').addEventListener('click', (e)=>{
  const id = e.target.dataset.id;
  if(!id) return;
  if(e.target.dataset.action === 'delete'){
    if(confirm('এই পণ্যটি মুছে ফেলতে চান?')){
      db.collection('products').doc(id).delete().then(()=> showToast('পণ্য মুছে ফেলা হয়েছে'));
    }
  }
  if(e.target.classList.contains('badge')){
    const p = products.find(x=>x.id===id);
    const newStatus = p.status === 'active' ? 'inactive' : 'active';
    db.collection('products').doc(id).update({ status: newStatus });
  }
});

// Add / edit product modal
document.getElementById('addProductBtn').addEventListener('click', ()=>{
  document.getElementById('productModalTitle').innerText = 'নতুন পণ্য যোগ করুন';
  ['editProductId','fProductName','fCategory','fBrand','fUnit','fPrice','fStock','fEmoji'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('productModal').classList.add('show');
});
document.getElementById('cancelProductBtn').addEventListener('click', ()=>{
  document.getElementById('productModal').classList.remove('show');
});
document.getElementById('saveProductBtn').addEventListener('click', ()=>{
  const data = {
    productName: document.getElementById('fProductName').value.trim(),
    category: document.getElementById('fCategory').value.trim(),
    brand: document.getElementById('fBrand').value.trim(),
    unit: document.getElementById('fUnit').value.trim(),
    price: Number(document.getElementById('fPrice').value) || 0,
    stock: Number(document.getElementById('fStock').value) || 0,
    emoji: document.getElementById('fEmoji').value.trim() || '🛒',
    status: 'active'
  };
  if(!data.productName || !data.category){
    alert('পণ্যের নাম ও ক্যাটাগরি আবশ্যক');
    return;
  }
  db.collection('products').add(data).then(()=>{
    document.getElementById('productModal').classList.remove('show');
    showToast('পণ্য যোগ করা হয়েছে');
  });
});

// Seed import
document.getElementById('importSeedBtn').addEventListener('click', async ()=>{
  if(!confirm('৫০০টি পণ্য ডেটাবেজে ইম্পোর্ট করা হবে। এগিয়ে যেতে চান?')) return;
  showToast('ইম্পোর্ট শুরু হয়েছে, অপেক্ষা করুন...');
  try{
    const res = await fetch('seed-products.json');
    const seedData = await res.json();
    const chunkSize = 400;
    for(let i=0; i<seedData.length; i+=chunkSize){
      const batch = db.batch();
      const chunk = seedData.slice(i, i+chunkSize);
      chunk.forEach(item=>{
        const ref = db.collection('products').doc();
        batch.set(ref, item);
      });
      await batch.commit();
    }
    showToast('সবগুলো পণ্য সফলভাবে ইম্পোর্ট হয়েছে ✅');
  }catch(err){
    alert('ইম্পোর্ট করতে সমস্যা হয়েছে: ' + err.message);
  }
});

// ---------- ORDERS ----------
function loadOrders(){
  db.collection('orders').orderBy('createdAt','desc').onSnapshot(snapshot=>{
    orders = snapshot.docs.map(doc=>({ id: doc.id, ...doc.data() }));
    renderOrders();
    renderStats();
  });
}

function renderOrders(){
  const filter = document.getElementById('orderStatusFilter').value;
  const list = document.getElementById('ordersList');
  const filtered = orders.filter(o=> filter==='সব' || o.status === filter);
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-note">কোনো অর্ডার নেই</div>`;
    return;
  }
  list.innerHTML = filtered.map(o=>{
    const date = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleString('bn-BD') : 'এইমাত্র';
    const itemsHtml = o.items.map(i=>`<div>${i.productName} (${i.unit}) × ${i.qty} — ৳${i.price*i.qty}</div>`).join('');
    return `
      <div class="order-card">
        <div class="order-head">
          <div>
            <div class="order-id">#${o.id.slice(-6).toUpperCase()}</div>
            <div class="order-meta">${o.customerName} • ${o.customerPhone}</div>
            <div class="order-meta">${o.customerAddress}</div>
            <div class="order-meta">${date}</div>
          </div>
          <span class="status-badge status-${o.status}">${o.status}</span>
        </div>
        <div class="order-items">${itemsHtml}</div>
        <div class="pay-info">💳 ${o.paymentMethod?.toUpperCase()} • ট্রানজেকশন আইডি: <b>${o.transactionId}</b></div>
        <div class="order-foot">
          <div class="order-total">সর্বমোট: ৳${o.total}</div>
          <div class="order-actions">
            ${o.status==='Pending' ? `<button class="btn btn-primary btn-sm" data-id="${o.id}" data-status="Confirmed">কনফার্ম করুন</button>` : ''}
            ${o.status==='Confirmed' ? `<button class="btn btn-primary btn-sm" data-id="${o.id}" data-status="Delivered">ডেলিভারড মার্ক করুন</button>` : ''}
            ${(o.status==='Pending'||o.status==='Confirmed') ? `<button class="btn btn-danger btn-sm" data-id="${o.id}" data-status="Cancelled">বাতিল করুন</button>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('orderStatusFilter').addEventListener('change', renderOrders);
document.getElementById('ordersList').addEventListener('click', (e)=>{
  const id = e.target.dataset.id;
  const status = e.target.dataset.status;
  if(!id || !status) return;
  db.collection('orders').doc(id).update({ status }).then(()=> showToast('অর্ডার স্ট্যাটাস আপডেট হয়েছে'));
});

// ---------- STATS ----------
function renderStats(){
  const pending = orders.filter(o=>o.status==='Pending').length;
  const todayStr = new Date().toDateString();
  const today = orders.filter(o=> o.createdAt && new Date(o.createdAt.seconds*1000).toDateString() === todayStr).length;
  const lowStock = products.filter(p=>p.stock<=5).length;
  document.getElementById('statPending').innerText = pending;
  document.getElementById('statToday').innerText = today;
  document.getElementById('statProducts').innerText = products.length;
  document.getElementById('statLowStock').innerText = lowStock;
}
</script>
